name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edtech
          POSTGRES_PASSWORD: edtech_secret
          POSTGRES_DB: edtech_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://edtech:edtech_secret@localhost:5432/edtech_docs?schema=public
      AUTH_SECRET: ci-test-secret-key-minimum-32-chars
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx prisma generate
      - run: npx prisma db push

      - run: npm run lint
      - run: npm run test
      - run: npm run build
